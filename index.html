<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ ARENA LEGENDS - NEON UPDATE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050014; --bg2:#0a0028; --panel:#11052b; --panel2:#1a0545;
  --gold:#FFD700; --gold2:#FFA500; --cyan:#00FFEE; --red:#FF2050;
  --green:#00FF80; --purple:#9B59B6; --blue:#3498DB;
  --border:#4a1080; --text:#E8D5FF; --font:'Orbitron', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;overflow:hidden;
  cursor:crosshair;}
#stars-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:1;background:rgba(5,0,20,0.8);backdrop-filter:blur(5px);}
.screen.active{display:flex;}

/* LOGIN */
#screen-login{flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--bg);}
.game-title{text-align:center;animation:titlePulse 2s ease-in-out infinite;}
.game-title .main{font-size:48px;font-weight:900;color:transparent;
  -webkit-text-stroke: 1px var(--gold);
  text-shadow: 0 0 20px var(--gold), 0 0 40px var(--red); letter-spacing:4px; display:block;}
.game-title .sub{font-size:14px;color:var(--cyan);letter-spacing:10px;display:block;margin-top:8px;text-shadow:0 0 15px var(--cyan);font-weight:bold;}
@keyframes titlePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
.login-box{background:linear-gradient(135deg, rgba(17,5,43,0.8), rgba(26,5,69,0.9));border:2px solid var(--cyan);
  padding:30px 40px;display:flex;flex-direction:column;align-items:center;gap:15px;
  box-shadow:0 0 30px rgba(0,255,238,0.2), inset 0 0 20px rgba(0,255,238,0.1); border-radius: 10px;}
.login-box label{font-size:12px;color:var(--cyan);letter-spacing:2px;font-weight:bold;}
.pixel-input{background:rgba(0,0,0,0.5);border:2px solid var(--border);color:var(--gold);font-family:var(--font);
  font-size:16px;padding:12px 20px;outline:none;width:100%;text-align:center;transition:all 0.3s;border-radius:5px;}
.pixel-input:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.4);}

/* BUTTONS */
.btn{font-family:var(--font);font-size:12px;font-weight:bold;padding:12px 24px;cursor:pointer;border:none;border-radius:5px;
  text-transform:uppercase;letter-spacing:2px;transition:all 0.2s;position:relative;overflow:hidden;color:#fff;}
.btn:active{transform:scale(0.95);}
.btn-gold{background:linear-gradient(45deg,#ff8800,#ff0055);box-shadow:0 0 20px rgba(255,0,85,0.4);}
.btn-gold:hover{box-shadow:0 0 30px rgba(255,0,85,0.8); filter:brightness(1.2);}
.btn-cyan{background:linear-gradient(45deg,#0055ff,#00ffee);box-shadow:0 0 20px rgba(0,255,238,0.4);}
.btn-cyan:hover{box-shadow:0 0 30px rgba(0,255,238,0.8); filter:brightness(1.2);}

/* MENU */
#screen-menu{flex-direction:column;padding:20px;gap:15px;}
.menu-header{display:flex;align-items:center;justify-content:space-between;
  background:rgba(17,5,43,0.8);border:1px solid var(--cyan); border-radius:8px;
  padding:10px 20px; box-shadow:0 0 20px rgba(0,255,238,0.1);}
.player-info{display:flex;align-items:center;gap:15px;}
.player-name{font-size:18px;color:var(--gold);font-weight:bold;text-shadow: 0 0 10px var(--gold);}
.player-title-txt{font-size:10px;color:var(--cyan);letter-spacing: 1px;}
.player-stats-txt{font-size:12px;color:var(--text);margin-top:5px;display:flex;gap:15px;}
.menu-body{display:flex;justify-content:center;align-items:center;flex:1;}
.big-buttons{display:flex;gap:20px;}
.big-btn{width:220px;height:220px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:15px;font-family:var(--font);font-size:16px;cursor:pointer;
  border:2px solid;border-radius:15px;text-transform:uppercase;letter-spacing:1px;transition:all 0.3s;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);}
.big-btn .icon{font-size:50px; text-shadow:0 0 20px currentColor;}
.big-btn-play{border-color:var(--red);color:var(--red);box-shadow:0 0 30px rgba(255,32,80,0.2);}
.big-btn-play:hover{transform:translateY(-10px);box-shadow:0 0 50px rgba(255,32,80,0.6);background:rgba(255,32,80,0.1);}
.big-btn-chars{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 30px rgba(0,255,238,0.2);}
.big-btn-chars:hover{transform:translateY(-10px);box-shadow:0 0 50px rgba(0,255,238,0.6);background:rgba(0,255,238,0.1);}

/* MATCHMAKING (PvP Simulation) */
#screen-matchmaking{flex-direction:column;align-items:center;justify-content:center;gap:30px;}
.radar{width:150px;height:150px;border:2px solid var(--cyan);border-radius:50%;position:relative;
  box-shadow:0 0 50px rgba(0,255,238,0.2), inset 0 0 30px rgba(0,255,238,0.2); overflow:hidden;}
.radar::after{content:'';position:absolute;top:50%;left:50%;width:50%;height:2px;background:var(--cyan);
  transform-origin:0% 50%;animation:scan 2s linear infinite; box-shadow: 0 0 15px var(--cyan);}
@keyframes scan{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.match-text{font-size:24px;color:var(--cyan);text-shadow:0 0 15px var(--cyan);letter-spacing:3px;}

/* BATTLE */
#screen-battle{flex-direction:column;background:transparent;}
.battle-top{padding:20px;flex-shrink:0;}
.battle-hpbars{display:flex;gap:30px;align-items:center;max-width:900px;margin:0 auto;}
.hp-section{flex:1;background:rgba(0,0,0,0.6);padding:10px;border-radius:8px;border:1px solid var(--border);}
.hp-label{font-size:14px;margin-bottom:8px;display:flex;justify-content:space-between;font-weight:bold;}
.hp-track{height:20px;background:#1a0020;border-radius:10px;overflow:hidden;border:1px solid #000;box-shadow:inset 0 0 10px #000;}
.hp-fill{height:100%;background:linear-gradient(90deg,#00CC40,#00FF80);transition:width 0.2s ease-out;box-shadow:0 0 15px #00FF80;}
.hp-fill.enemy{background:linear-gradient(90deg,#CC0020,#FF2050);box-shadow:0 0 15px #FF2050;}
.vs-badge{font-size:24px;color:var(--gold);text-shadow:0 0 20px var(--red);font-weight:900;font-style:italic;}

/* BATTLE BOTTOM */
.battle-bottom{background:linear-gradient(0deg,rgba(5,0,20,1),rgba(5,0,20,0.8));
  border-top:2px solid var(--cyan);padding:15px;display:flex;flex-direction:column;gap:15px;flex-shrink:0;box-shadow:0 -10px 30px rgba(0,255,238,0.1);}
.battle-msg-bar{font-size:16px;color:var(--gold);text-align:center;min-height:24px;text-shadow:0 0 10px var(--gold);letter-spacing:1px;}
.key-row{display:flex;gap:15px;align-items:stretch;justify-content:center;}
.key-slot{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:transform 0.1s;}
.key-slot:active:not(.disabled){transform:scale(0.9);}
.key-cap{width:50px;height:50px;background:rgba(0,0,0,0.8);border:2px solid;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;transition:all 0.15s;}
.key-cap.disabled{opacity:0.3;cursor:not-allowed;}
.key-card{width:160px;background:rgba(20,5,40,0.8);border:1px solid;border-radius:8px;padding:10px;
  display:flex;flex-direction:column;gap:5px;text-align:center;}
.kc-icon{font-size:24px;}
.kc-name{font-size:10px;font-weight:bold;text-transform:uppercase;}
.dmg-num{position:absolute;font-family:var(--font);font-size:30px;font-weight:900;pointer-events:none;
  animation:dmgFloat 1s cubic-bezier(0.2, 1, 0.3, 1) forwards;text-shadow:0 0 10px #000, 2px 2px 0 #000;z-index:10;}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1.5);}100%{opacity:0;transform:translateY(-80px) scale(0.8);}}
.battle-canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:0;}

/* UTILS */
.back-btn-fixed{position:fixed;top:20px;left:20px;z-index:100;}
</style>
</head>
<body>
<canvas id="stars-bg"></canvas>

<div id="screen-login" class="screen active">
  <div class="game-title">
    <span class="main">ARENA LEGENDS</span>
    <span class="sub">NEON CYBERPUNK</span>
  </div>
  <div class="login-box">
    <label>NHẬP TÊN CHIẾN BINH</label>
    <input type="text" id="name-input" class="pixel-input" placeholder="Ví dụ: Faker..." maxlength="16" autocomplete="off">
    <button class="btn btn-cyan" onclick="startGame()" style="width:100%;font-size:16px;">VÀO MÁY CHỦ</button>
  </div>
</div>

<div id="screen-menu" class="screen">
  <div class="menu-header">
    <div class="player-info">
      <div>
        <div class="player-name" id="menu-pname">PLAYER</div>
        <div class="player-title-txt">Hệ Lửa (Blaze)</div>
        <div class="player-stats-txt">
          <span id="menu-kills" style="color:var(--red)">⚔️ 0 Kills</span>
          <span id="menu-level" style="color:var(--green)">Lv. 1</span>
        </div>
      </div>
    </div>
  </div>
  <div class="menu-body">
    <div class="big-buttons">
      <div class="big-btn big-btn-play" onclick="findMatch()">
        <div class="icon">⚔️</div>
        <div>ĐẤU HẠNG</div>
        <div style="font-size:10px;opacity:0.7;color:var(--text)">TÌM ĐỐI THỦ NGẪU NHIÊN</div>
      </div>
      <div class="big-btn big-btn-chars" onclick="alert('Tính năng chọn tướng đang cập nhật!')">
        <div class="icon">⚡</div>
        <div>NÂNG CẤP</div>
        <div style="font-size:10px;opacity:0.7;color:var(--text)">SỨC MẠNH</div>
      </div>
    </div>
  </div>
</div>

<div id="screen-matchmaking" class="screen">
  <div class="match-text">ĐANG TÌM ĐỐI THỦ...</div>
  <div class="radar"></div>
  <div style="color:var(--text);font-size:12px;opacity:0.7;">Đang kết nối Server PVP...</div>
  </div>

<div id="screen-battle" class="screen" style="flex-direction:column;">
  <div class="battle-top">
    <div class="battle-hpbars">
      <div class="hp-section">
        <div class="hp-label">
          <span id="p-charname" style="color:var(--cyan)">PLAYER</span>
          <span id="p-hptxt" style="color:var(--green)">100/100</span>
        </div>
        <div class="hp-track"><div class="hp-fill" id="p-hpbar" style="width:100%"></div></div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="hp-section" style="text-align:right">
        <div class="hp-label" style="flex-direction:row-reverse">
          <span id="e-charname" style="color:var(--red)">ENEMY</span>
          <span id="e-hptxt" style="color:var(--red)">100/100</span>
        </div>
        <div class="hp-track"><div class="hp-fill enemy" id="e-hpbar" style="width:100%;float:right"></div></div>
      </div>
    </div>
  </div>

  <div class="battle-canvas-wrap">
    <canvas id="battle-canvas" style="width:100%;height:100%;display:block;"></canvas>
  </div>

  <div class="battle-bottom">
    <div class="battle-msg-bar" id="battle-msg">...</div>
    <div class="key-row" id="key-row"></div>
    <div style="text-align:center;font-size:10px;color:#888;">DÙNG CHUỘT HOẶC PHÍM 0, 1, 2, 3 ĐỂ TUNG CHIÊU</div>
  </div>
</div>

<script>
/* =================== DATA & SETUP =================== */
const SKILLS = [
  {name:'ĐÁNH THƯỜNG', icon:'⚔️', cd:0, maxCd:0, color:'var(--red)'},
  {name:'BÃO LỬA', icon:'🔥', cd:0, maxCd:2, color:'#FF8800'},
  {name:'SẤM SÉT', icon:'⚡', cd:0, maxCd:3, color:'var(--cyan)'},
  {name:'HỒI MÁU', icon:'💖', cd:0, maxCd:4, color:'var(--green)'}
];

let player = {name:'', hp:150, maxHP:150, kills:0, level:1};
let battle = null, battleRaf = null;
let particles = [];
let screenShake = 0; // Biến tạo độ rung màn hình

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function startGame() {
  const name = document.getElementById('name-input').value.trim();
  if(!name) return alert("Nhập tên đi bro!");
  player.name = name;
  document.getElementById('menu-pname').textContent = name.toUpperCase();
  showScreen('menu');
}

/* =================== MATCHMAKING (PVP FAKE) =================== */
function findMatch() {
  showScreen('matchmaking');
  
  // TODO: Nơi này để gửi tín hiệu lên Server Socket.io
  // socket.emit('join_queue', player.name);
  // socket.on('match_found', (enemyData) => { startBattle(enemyData) });

  // Giả lập tìm thấy người chơi thật sau 2.5 giây
  setTimeout(() => {
    startBattle();
  }, 2500);
}

/* =================== BATTLE LOGIC =================== */
function startBattle() {
  const botNames = ['Yasuo_Main', 'Faker_Fake', 'Cyber_Ninja', 'Pro_Player99'];
  battle = {
    pHP: player.maxHP, pMax: player.maxHP,
    eHP: 150, eMax: 150, eName: botNames[Math.floor(Math.random()*botNames.length)],
    phase: 'player', t: 0, ended: false,
    skills: JSON.parse(JSON.stringify(SKILLS))
  };

  document.getElementById('p-charname').textContent = player.name;
  document.getElementById('e-charname').textContent = battle.eName;
  updateHP();
  renderKeyUI();
  setMsg('🎯 TRẬN ĐẤU BẮT ĐẦU! Lượt của bạn!');
  
  document.removeEventListener('keydown', handleKey);
  document.addEventListener('keydown', handleKey);

  showScreen('battle');
  if(battleRaf) cancelAnimationFrame(battleRaf);
  battleLoop();
}

function updateHP() {
  document.getElementById('p-hpbar').style.width = (battle.pHP/battle.pMax*100)+'%';
  document.getElementById('p-hptxt').textContent = battle.pHP;
  document.getElementById('e-hpbar').style.width = Math.max(0, battle.eHP/battle.eMax*100)+'%';
  document.getElementById('e-hptxt').textContent = battle.eHP;
}
function setMsg(m) { document.getElementById('battle-msg').textContent = m; }

/* =================== GRAPHICS UPDATE (NEON STYLE) =================== */
function battleLoop() {
  const cvs = document.getElementById('battle-canvas');
  if(!cvs || !battle) return;
  const ctx = cvs.getContext('2d');
  cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
  const W = cvs.width, H = cvs.height;
  battle.t += 0.05; 

  ctx.clearRect(0,0,W,H);

  // Hiệu ứng Rung màn hình (Screen Shake)
  ctx.save();
  if(screenShake > 0) {
    const dx = (Math.random() - 0.5) * screenShake;
    const dy = (Math.random() - 0.5) * screenShake;
    ctx.translate(dx, dy);
    screenShake -= 1.5; // Giảm dần độ rung
  }

  // Vẽ sàn đấu Cyber
  ctx.strokeStyle = 'rgba(0, 255, 238, 0.2)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, H*0.7); ctx.lineTo(W, H*0.7);
  ctx.stroke();

  // Vẽ Nhân vật kiểu Neon Vector thay vì hình vuông
  drawNeonChar(ctx, W*0.2, H*0.7, battle.t, '#00FFEE', '#0055FF', 1); // Người chơi
  drawNeonChar(ctx, W*0.8, H*0.7, battle.t, '#FF2050', '#880000', -1); // Đối thủ

  drawParticles(ctx);
  ctx.restore();

  battleRaf = requestAnimationFrame(battleLoop);
}

function drawNeonChar(ctx, x, y, t, color, coreColor, dir) {
  const floatY = Math.sin(t) * 10;
  ctx.save();
  ctx.translate(x, y - 60 + floatY);
  
  // Vòng sáng Aura
  ctx.shadowBlur = 30;
  ctx.shadowColor = color;
  
  // Body (Lõi)
  ctx.fillStyle = coreColor;
  ctx.beginPath();
  ctx.arc(0, 0, 25, 0, Math.PI*2);
  ctx.fill();

  // Viền Neon
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.stroke();

  // Mắt Cyber
  ctx.fillStyle = '#FFF';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#FFF';
  ctx.beginPath();
  ctx.arc(dir * 10, -5, 5, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

/* =================== PARTICLES VFX =================== */
function spawnVFX(x, y, color, count) {
  for(let i=0; i<count; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15 - 5,
      life: 1, color: color, size: Math.random()*8 + 4
    });
  }
}

function drawParticles(ctx) {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.5; // Trọng lực
    p.life -= 0.03;
    
    ctx.shadowBlur = 15;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life);
    
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  });
}

/* =================== COMBAT =================== */
function showDmg(val, isPlayer) {
  const cvs = document.getElementById('battle-canvas');
  const d = document.createElement('div');
  d.className = 'dmg-num';
  d.textContent = val < 0 ? '+'+Math.abs(val) : '-'+val;
  d.style.color = val < 0 ? '#00FF80' : '#FF2050';
  d.style.left = (isPlayer ? cvs.offsetWidth*0.2 : cvs.offsetWidth*0.8) - 20 + 'px';
  d.style.top = cvs.offsetHeight*0.5 + 'px';
  document.getElementById('screen-battle').appendChild(d);
  setTimeout(()=>d.remove(), 1000);
}

function handleKey(e) {
  const map = {'0':0, '1':1, '2':2, '3':3};
  if(map[e.key] !== undefined) doAction(map[e.key]);
}

function doAction(idx) {
  if(battle.phase !== 'player' || battle.ended) return;
  const sk = battle.skills[idx];
  if(sk.cd > 0) return;

  battle.phase = 'anim';
  
  // TODO: Nếu nối Server, gọi socket.emit('player_attack', idx);
  // Thay vì tự tính dmg dưới này, sẽ đợi Server trả về lượng máu bị trừ.

  let dmg = 0;
  const cvs = document.getElementById('battle-canvas');
  const W = cvs.offsetWidth, H = cvs.offsetHeight;

  if(idx === 3) { // Hồi máu
    dmg = -30;
    battle.pHP = Math.min(battle.pMax, battle.pHP - dmg);
    spawnVFX(W*0.2, H*0.6, '#00FF80', 30);
    setMsg('💖 Bạn dùng hồi máu: +30 HP!');
  } else {
    dmg = Math.floor(Math.random()*15 + 10 + (idx*10));
    battle.eHP -= dmg;
    screenShake = 20; // Kích hoạt rung màn hình
    spawnVFX(W*0.8, H*0.6, sk.color, 40); // Bắn hạt vào địch
    setMsg(`💥 Bạn dùng [${sk.name}] gây ${dmg} sát thương!`);
  }
  
  showDmg(dmg, dmg < 0);
  sk.cd = sk.maxCd;
  updateHP();
  renderKeyUI();

  setTimeout(checkEnd, 1000);
}

function checkEnd() {
  if(battle.eHP <= 0) {
    battle.ended = true;
    setMsg('🏆 CHIẾN THẮNG!');
    player.kills++;
    setTimeout(()=>showScreen('menu'), 2000);
    return;
  }
  enemyTurn();
}

function enemyTurn() {
  battle.phase = 'enemy';
  setMsg('🤖 Đối thủ đang chọn chiêu...');
  
  setTimeout(() => {
    const dmg = Math.floor(Math.random()*20 + 10);
    battle.pHP -= dmg;
    screenShake = 15;
    
    const cvs = document.getElementById('battle-canvas');
    spawnVFX(cvs.offsetWidth*0.2, cvs.offsetHeight*0.6, '#FF2050', 30);
    
    setMsg(`⚔️ ${battle.eName} tấn công bạn: -${dmg} HP!`);
    showDmg(dmg, true);
    updateHP();

    if(battle.pHP <= 0) {
      battle.ended = true;
      setMsg('💀 BẠN ĐÃ THUA TRẬN!');
      setTimeout(()=>showScreen('menu'), 2000);
    } else {
      battle.skills.forEach(s => {if(s.cd>0) s.cd--});
      battle.phase = 'player';
      setMsg('🎯 TỚI LƯỢT BẠN!');
      renderKeyUI();
    }
  }, 1500);
}

/* =================== UI =================== */
function renderKeyUI() {
  const row = document.getElementById('key-row');
  row.innerHTML = '';
  battle.skills.forEach((sk, i) => {
    const disabled = battle.phase !== 'player' || sk.cd > 0;
    const div = document.createElement('div');
    div.className = 'key-slot';
    div.onclick = () => doAction(i);
    div.innerHTML = `
      <div class="key-cap ${disabled?'disabled':''}" style="color:${sk.color}; border-color:${sk.color}; box-shadow:${disabled?'none':`0 0 15px ${sk.color}`}">
        ${i}
      </div>
      <div class="key-card" style="border-color:${sk.color}; opacity:${disabled?0.5:1}">
        <div class="kc-icon">${sk.icon}</div>
        <div class="kc-name" style="color:${sk.color}">${sk.name}</div>
        ${sk.cd > 0 ? `<div style="font-size:10px;color:red">⏳ CD: ${sk.cd}</div>` : ''}
      </div>
    `;
    row.appendChild(div);
  });
}

initStars();
function initStars(){
  const c=document.getElementById('stars-bg'); const ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;} resize(); window.addEventListener('resize',resize);
  const stars=Array.from({length:100},()=>({x:Math.random()*c.width,y:Math.random()*c.height,s:Math.random()*2,vy:Math.random()*0.5+0.1}));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill();s.y+=s.vy;if(s.y>c.height)s.y=0;});
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
